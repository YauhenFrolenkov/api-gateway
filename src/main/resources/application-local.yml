spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/auth/**

            - id: user-service
              uri: http://localhost:8080
              predicates:
                - Path=/users/**

            - id: order-service
              uri: http://localhost:8082
              predicates:
                - Path=/orders/**

server:
  port: 8083