spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: ${services.auth.url}
              predicates:
                - Path=/auth/**

            - id: user-service
              uri: ${services.user.url}
              predicates:
                - Path=/users/**,/cards/**

            - id: order-service
              uri: ${services.order.url}
              predicates:
                - Path=/orders/**

server:
  port: ${SERVER_PORT:8083}

jwt:
  secret: ${JWT_SECRET:superSecretKeyThatIsLongEnoughForJwt123456789}