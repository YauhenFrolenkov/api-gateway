services:

  user-postgres:
    image: postgres:15
    container_name: user-service-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: user_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql/data

  auth-postgres:
    image: postgres:15
    container_name: auth-service-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data

  order-postgres:
    image: postgres:15
    container_name: order-service-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: order_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - order_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  auth-service:
    build: ../auth-service
    container_name: auth-service-app
    restart: unless-stopped
    depends_on:
      - auth-postgres
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://auth-postgres:5432/auth_service_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: superSecretKeyThatIsLongEnoughForJwt123456789

  user-service:
    build: ../user-service
    container_name: user-service-app
    restart: unless-stopped
    depends_on:
      - user-postgres
      - redis
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://user-postgres:5432/user_service_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: superSecretKeyThatIsLongEnoughForJwt123456789
      REDIS_HOST: redis
      REDIS_PORT: 6379

  order-service:
    build: ../order-service
    container_name: order-service-app
    restart: unless-stopped
    depends_on:
      - order-postgres
    ports:
      - "8082:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://order-postgres:5432/order_service_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: superSecretKeyThatIsLongEnoughForJwt123456789
      USER_SERVICE_URL: http://user-service:8080

  api-gateway:
    build: .
    container_name: api-gateway
    restart: unless-stopped
    depends_on:
      - auth-service
      - user-service
      - order-service
    ports:
      - "8083:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: superSecretKeyThatIsLongEnoughForJwt123456789
      AUTH_SERVICE_URL: http://auth-service:8080
      USER_SERVICE_URL: http://user-service:8080
      ORDER_SERVICE_URL: http://order-service:8080

volumes:
  user_postgres_data:
  auth_postgres_data:
  order_postgres_data: